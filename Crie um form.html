<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

</head>

<body>
    <form action="/emviar_dados.php" method="post">
        
        <p>
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome_usuario" placeholder="Digite a desgraça do seu nome..." required>
        </p>

        <p>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha_usuario" placeholder="Digite a senha..." required>
        </p>

        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email_ususario" placeholder="nome@gmail.com..." pattern="@" required>
        </p>

        <p>
            <label for="telefone">telefone:</label>
            <input type="number" id="telefone" name="numero_usuario" placeholder="Ex: (55) 81 99080-7865" required>
        </p>

        <p>
            <label for="cor">Cor do veiculo:</label>
            <input type="color" id="cor" name="cor_veiculo" required>
        </p>

        <p>
            <label for="data de compra">Data de compra</label>
            <input type="date" id="data de compra" name="data_compra" required>
        </p>

    </form>    
</body>

</html>
